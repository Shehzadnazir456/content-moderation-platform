version: '3.8'

services:
  mongo:
    image: mongo:6
    container_name: mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: moderation_db

  backend:
    build: ./backend
    container_name: backend
    command: >
      sh -c "python manage.py migrate --run-syncdb &&
             python manage.py runserver 0.0.0.0:8000"
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - media_files:/app/media
    environment:
      - DJANGO_SECRET_KEY=super-secret-change-this
      - MONGO_URI=mongodb://mongo:27017
      - MONGO_DB_NAME=moderation_db
      - GROQ_API_KEY=${GROQ_API_KEY}
    depends_on:
      - mongo

  frontend:
    build: ./frontend
    container_name: frontend
    ports:
      - "3000:3000"
    environment:
      - REACT_APP_API_URL=http://localhost:8000/api
      - DISABLE_ESLINT_PLUGIN=true
    depends_on:
      - backend

volumes:
  mongo_data:
  media_files: